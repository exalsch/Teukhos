forge:
  name: "dev-tools"
  version: "1.0.0"
  description: "Developer and system tools for AI agents"

server:
  transport: stdio

tools:
  - name: ping
    description: "Health check - returns server name and version"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "print('dev-tools v1.0.0: pong')"
      timeout_seconds: 15
    output:
      type: stdout

  - name: list_processes
    description: "List running processes"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "import subprocess,platform; subprocess.run(['tasklist'] if platform.system()=='Windows' else ['ps','aux'])"
      timeout_seconds: 10
    output:
      type: stdout

  - name: disk_usage
    description: "Show disk usage for a path"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "import shutil,sys,os; p=sys.argv[1] if len(sys.argv)>1 else '.'; p=os.path.abspath(p); u=shutil.disk_usage(p); print(f'Path: {p}'); print(f'Total: {u.total/1024/1024:.0f} MB'); print(f'Used:  {u.used/1024/1024:.0f} MB ({u.used/u.total*100:.1f}%)'); print(f'Free:  {u.free/1024/1024:.0f} MB ({u.free/u.total*100:.1f}%)')"
      timeout_seconds: 10
    args:
      - name: path
        type: string
        description: "Path to check disk usage for"
        required: false
        positional: true
        default: "."
    output:
      type: stdout

  - name: ping_host
    description: "Ping a host to check connectivity"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "import subprocess,platform,sys; h=sys.argv[1]; flag='-n' if platform.system()=='Windows' else '-c'; r=subprocess.run(['ping',flag,'3',h],capture_output=True,text=True); print(r.stdout); exit(r.returncode)"
      timeout_seconds: 15
    args:
      - name: host
        type: string
        description: "Hostname or IP to ping"
        required: true
        positional: true
    output:
      type: exit_code
      exit_codes:
        0: "Host is reachable"
        1: "Host is unreachable"
        2: "Network error or unknown host"

  # WARNING: This tool executes arbitrary shell commands.
  # Only use locally — NEVER expose remotely without authentication.
  - name: run_command
    description: "Run an arbitrary shell command (local use only — do not expose remotely without auth). Uses system shell (cmd on Windows, sh on Linux/macOS)."
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "import subprocess,sys; r=subprocess.run(sys.argv[1],shell=True,capture_output=True,text=True); print(r.stdout); print(r.stderr,end='',file=__import__('sys').stderr); exit(r.returncode)"
      timeout_seconds: 30
    args:
      - name: command
        type: string
        description: "Shell command to execute"
        required: true
        positional: true
    output:
      type: stdout
