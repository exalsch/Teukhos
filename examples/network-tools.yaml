forge:
  name: "network-tools"
  version: "1.0.0"
  description: "Network diagnostics, HTTP testing, and DNS lookup tools"

server:
  transport: stdio

tools:
  - name: ping
    description: "Health check - returns server name and version"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "print('network-tools v1.0.0: pong')"
      timeout_seconds: 15
    output:
      type: stdout

  - name: http_request
    description: "Make an HTTP request and show response headers + body"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - >-
          import urllib.request,urllib.error,sys;
          url=sys.argv[1];
          method=None;header=None;data=None;
          i=2;
          while i<len(sys.argv):
           a=sys.argv[i];
           i+=1;
           if a=='-X':method=sys.argv[i];i+=1
           elif a=='-H':header=sys.argv[i];i+=1
           elif a=='-d':data=sys.argv[i].encode();i+=1
          ;
          req=urllib.request.Request(url,data=data,method=method or('POST' if data else 'GET'));
          header and req.add_header(*header.split(': ',1));
          try:
           r=urllib.request.urlopen(req,timeout=25);
           print(f'HTTP {r.status}');
           [print(f'{k}: {v}') for k,v in r.getheaders()];
           print();print(r.read().decode(errors='replace'))
          except urllib.error.HTTPError as e:
           print(f'HTTP {e.code}');print(e.read().decode(errors='replace'))
          except Exception as e:print(f'Error: {e}')
      timeout_seconds: 30
    args:
      - name: url
        type: string
        description: "URL to request"
        required: true
        positional: true
      - name: method
        type: string
        description: "HTTP method (GET, POST, PUT, DELETE)"
        required: false
        flag: "-X"
      - name: header
        type: string
        description: "Custom header (e.g. 'Content-Type: application/json')"
        required: false
        flag: "-H"
      - name: data
        type: string
        description: "Request body data"
        required: false
        flag: "-d"
    output:
      type: stdout

  - name: dns_lookup
    description: "Look up DNS records for a domain (A records by default)"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - >-
          import socket,sys;
          domain=sys.argv[1];
          rtype=sys.argv[2] if len(sys.argv)>2 else 'A';
          try:
           results=socket.getaddrinfo(domain,None,socket.AF_INET if rtype=='A' else socket.AF_INET6 if rtype=='AAAA' else socket.AF_INET);
           seen=set();
           [print(r[4][0]) for r in results if r[4][0] not in seen and not seen.add(r[4][0])]
          except socket.gaierror as e:print(f'DNS lookup failed: {e}')
      timeout_seconds: 10
    args:
      - name: domain
        type: string
        description: "Domain name to look up"
        required: true
        positional: true
      - name: record_type
        type: string
        description: "Record type (A or AAAA - for MX/TXT/NS use nslookup or dig directly)"
        required: false
        positional: true
    output:
      type: stdout

  - name: ssl_cert_check
    description: "Check SSL/TLS certificate details and expiry for a domain"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - >-
          import ssl,socket,sys,datetime;
          host=sys.argv[1];port=int(sys.argv[2]) if len(sys.argv)>2 else 443;
          ctx=ssl.create_default_context();
          try:
           with ctx.wrap_socket(socket.socket(),server_hostname=host) as s:
            s.settimeout(10);s.connect((host,port));cert=s.getpeercert();
            print(f'Host: {host}:{port}');
            subj=dict(x[0] for x in cert['subject']);
            print(f'Subject: {subj.get("commonName","N/A")}');
            issuer=dict(x[0] for x in cert['issuer']);
            print(f'Issuer: {issuer.get("organizationName","N/A")}');
            print(f'Valid from: {cert["notBefore"]}');
            print(f'Valid until: {cert["notAfter"]}');
            exp=datetime.datetime.strptime(cert['notAfter'],'%b %d %H:%M:%S %Y GMT');
            days=(exp-datetime.datetime.utcnow()).days;
            print(f'Days until expiry: {days}');
            sans=[v for t,v in cert.get('subjectAltName',[])];
            sans and print(f'SANs: {", ".join(sans[:5])}{"..." if len(sans)>5 else ""}')
          except Exception as e:print(f'SSL check failed: {e}')
      timeout_seconds: 15
    args:
      - name: host
        type: string
        description: "Domain to check SSL certificate for"
        required: true
        positional: true
      - name: port
        type: integer
        description: "Port number (default 443)"
        required: false
        positional: true
    output:
      type: stdout

  - name: port_check
    description: "Check if a TCP port is open on a host"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - >-
          import socket,sys;
          host=sys.argv[1];port=int(sys.argv[2]);
          s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);
          s.settimeout(5);
          try:s.connect((host,port));print(f'{host}:{port} OPEN');s.close()
          except ConnectionRefusedError:print(f'{host}:{port} CLOSED')
          except socket.timeout:print(f'{host}:{port} FILTERED (timeout)')
          except socket.gaierror:print(f'{host}:{port} ERROR (DNS resolution failed)')
          except Exception as e:print(f'{host}:{port} ERROR ({e})')
      timeout_seconds: 10
    args:
      - name: host
        type: string
        description: "Hostname or IP address"
        required: true
        positional: true
      - name: port
        type: integer
        description: "TCP port number to check"
        required: true
        positional: true
    output:
      type: stdout

  - name: traceroute
    description: "Trace the network path to a host"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - "import subprocess,platform,sys; h=sys.argv[1]; cmd=['tracert','-d','-h','15',h] if platform.system()=='Windows' else ['traceroute','-n','-m','15',h]; r=subprocess.run(cmd,capture_output=True,text=True); print(r.stdout); r.stderr and print(r.stderr)"
      timeout_seconds: 60
    args:
      - name: host
        type: string
        description: "Hostname or IP to trace"
        required: true
        positional: true
    output:
      type: stdout

  - name: whois_lookup
    description: "Look up domain registration info via WHOIS protocol"
    adapter: cli
    cli:
      command: python
      subcommand:
        - "-c"
        - >-
          import socket,sys;
          domain=sys.argv[1];
          tld=domain.rsplit('.',1)[-1];
          whois_server=f'{tld}.whois-servers.net';
          try:
           s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);
           s.settimeout(10);s.connect((whois_server,43));
           s.send(f'{domain}\r\n'.encode());
           resp=b'';
           while True:
            d=s.recv(4096);
            if not d:break
            ;resp+=d
           ;s.close();print(resp.decode(errors='replace'))
          except Exception as e:print(f'WHOIS lookup failed: {e}')
      timeout_seconds: 15
    args:
      - name: domain
        type: string
        description: "Domain to look up"
        required: true
        positional: true
    output:
      type: stdout
